
<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>最強統合AI（競輪×ボート）</title>
<style>
body{margin:0;background:#0b1220;color:#fff;font-family:-apple-system}
.app{max-width:430px;margin:auto;padding:10px}
.card{background:#111827;padding:14px;margin:10px 0;border-radius:16px}
button,select,input{width:100%;padding:10px;margin-top:6px;border-radius:10px;border:none}
button{background:linear-gradient(135deg,#2563eb,#06b6d4);color:#fff;font-weight:800}
.tab{display:flex;gap:6px}
.tab button{flex:1}
.active{background:#16a34a}
</style>
</head>
<body>
<div class="app">

<div class="card">
<div class="tab">
<button onclick="setMode('boat')" id="boatBtn" class="active">🚤 ボート</button>
<button onclick="setMode('keirin')" id="keirinBtn">🚴 競輪</button>
</div>
</div>

<div id="boatArea" class="card">
<h3>ボートレースAI</h3>
<input id="b1" placeholder="1号艇 全国勝率">
<input id="b2" placeholder="2号艇 全国勝率">
<button onclick="runBoat()">予想</button>
</div>

<div id="keirinArea" class="card" style="display:none">
<h3>競輪AI</h3>
<input id="k1" placeholder="1番 車券指数">
<input id="k2" placeholder="2番 車券指数">
<button onclick="runKeirin()">予想</button>
</div>

<div class="card">
<div id="result">結果待ち</div>
</div>

</div>

<script>
let mode="boat";

function setMode(m){
mode=m;
document.getElementById("boatArea").style.display = m==="boat"?"block":"none";
document.getElementById("keirinArea").style.display = m==="keirin"?"block":"none";

document.getElementById("boatBtn").classList.remove("active");
document.getElementById("keirinBtn").classList.remove("active");

document.getElementById(m+"Btn").classList.add("active");
}

function runBoat(){
let v1=+document.getElementById("b1").value||0;
let v2=+document.getElementById("b2").value||0;

let result = v1>v2 ? "1号艇本命" : "2号艇本命";

document.getElementById("result").innerHTML =
"<h3>🚤ボート結果</h3>"+result;
}

function runKeirin(){
let v1=+document.getElementById("k1").value||0;
let v2=+document.getElementById("k2").value||0;

let result = v1>v2 ? "1番有利" : "2番有利";

document.getElementById("result").innerHTML =
"<h3>🚴競輪結果</h3>"+result;
}
</script>

</body>
</html>
