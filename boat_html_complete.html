<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>BOAT RACE AI PRO MAX</title>
<meta name="theme-color" content="#0b1220">
<style>
:root{
  --line:#243a63; --text:#edf4ff; --muted:#9fb3d9;
  --blue:#2563eb; --cyan:#06b6d4; --green:#16a34a; --gold:#f59e0b; --red:#dc2626; --violet:#7c3aed;
}
*{box-sizing:border-box}
body{
  margin:0;color:var(--text);
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
  background:
    radial-gradient(circle at top left,#16335f 0%,#08101c 42%),
    linear-gradient(180deg,#08101c,#091221);
}
.app{max-width:430px;margin:auto;padding:0 10px 30px}
.header{
  padding:18px 14px 22px;margin:0 -10px 10px;
  background:linear-gradient(135deg,#0f172a,#1d4ed8 58%,#06b6d4);
  border-bottom-left-radius:24px;border-bottom-right-radius:24px;
  box-shadow:0 12px 26px rgba(0,0,0,.35);
}
.header h1{margin:0;font-size:24px}
.header p{margin:6px 0 0;font-size:12px;opacity:.94}
.card{
  background:linear-gradient(180deg,rgba(18,29,52,.98),rgba(11,20,36,.98));
  border:1px solid var(--line);
  border-radius:16px;
  padding:14px;
  margin:10px 0;
}
.section{font-size:14px;font-weight:800;margin-bottom:8px}
.row{display:flex;gap:8px}.row>*{flex:1}
input,select,button{
  width:100%;padding:10px;margin-top:6px;border:none;border-radius:10px;
  box-sizing:border-box;font-size:16px
}
input,select{background:#020617;color:#fff}
button{background:linear-gradient(135deg,var(--blue),var(--cyan));color:#fff;font-weight:800}
.btn-sub{background:linear-gradient(135deg,#475569,#334155)}
.grid{display:grid;grid-template-columns:40px repeat(5,1fr);gap:6px;align-items:center;margin-top:6px}
.cap{
  height:40px;border-radius:8px;display:flex;align-items:center;justify-content:center;
  font-weight:900
}
.c1{background:#fff;color:#000}.c2{background:#000;color:#fff}.c3{background:#ef4444;color:#fff}.c4{background:#2563eb;color:#fff}.c5{background:#f59e0b;color:#111}.c6{background:#16a34a;color:#fff}
.badge{display:inline-block;padding:6px 10px;border-radius:999px;margin:4px;font-weight:800}
.good{background:var(--green)} .warn{background:var(--red)} .tip{background:var(--violet)} .gold{background:var(--gold);color:#111}
.small{font-size:12px;color:var(--muted);line-height:1.6}
.commentbox{margin-top:10px;padding:12px;border-radius:12px;background:#0f172a;border:1px solid #243352;line-height:1.7}
.table{width:100%;border-collapse:collapse;margin-top:8px}
.table th,.table td{border-bottom:1px solid #223454;padding:8px 6px;text-align:center;font-size:13px}
.odds-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:6px}
.odds-grid input{margin-top:0}
.money{margin-top:10px;padding:10px;border-radius:12px;background:#0f172a}
.nav{display:flex;gap:8px}
.nav a{
  flex:1;text-align:center;text-decoration:none;color:#fff;font-weight:800;
  background:#111827;border:1px solid #29405f;border-radius:14px;padding:12px 8px;
}
.nav a.active{background:linear-gradient(135deg,#2563eb,#06b6d4)}
</style>
</head>
<body>
<div class="app">
  <div class="header">
    <h1>BOAT RACE AI PRO MAX</h1>
    <p>ボート専用 / 展開予想 / 勝ち筋説明 / AI値順位 / 資金配分</p>
  </div>

  <div class="card">
    <div class="nav">
      <a href="index.html">メニュー</a>
      <a href="boat.html" class="active">ボート</a>
      <a href="keirin.html">競輪</a>
      <a href="unified.html">統合</a>
    </div>
  </div>

  <div class="card">
    <div class="row">
      <button onclick="clearData()" class="btn-sub">全クリア</button>
    </div>
  </div>

  <div class="card">
    <div class="section">基本設定</div>
    <select id="track">
      <option>桐生</option><option>戸田</option><option>江戸川</option><option>平和島</option><option>多摩川</option>
      <option>浜名湖</option><option>蒲郡</option><option>常滑</option><option>津</option><option>三国</option>
      <option>びわこ</option><option>住之江</option><option>尼崎</option><option>鳴門</option><option>丸亀</option>
      <option>児島</option><option>宮島</option><option>徳山</option><option>下関</option><option>若松</option>
      <option>芦屋</option><option>福岡</option><option>唐津</option><option>大村</option>
    </select>
    <input id="budget" inputmode="numeric" placeholder="予算（例: 3000）">
    <div class="small">入力項目：全国勝率 / モーター2連対率 / 平均ST / 展示 / 級</div>
  </div>

  <div class="card">
    <div class="section">入力</div>
    <div class="grid">
      <div>艇</div><div>全国</div><div>M2</div><div>ST</div><div>展示</div><div>級</div>
    </div>
    <div id="inputs"></div>
  </div>

  <div class="card">
    <div class="section">オッズ（任意）</div>
    <div class="small">妙味判定用です。空欄でも使えます。</div>
    <div class="odds-grid">
      <input id="odds123" placeholder="1-2-3"><input id="odds132" placeholder="1-3-2"><input id="odds213" placeholder="2-1-3">
      <input id="odds231" placeholder="2-3-1"><input id="odds312" placeholder="3-1-2"><input id="odds412" placeholder="4-1-2">
      <input id="odds124" placeholder="1-2-4"><input id="odds142" placeholder="1-4-2"><input id="odds134" placeholder="1-3-4">
      <input id="odds214" placeholder="2-1-4"><input id="odds241" placeholder="2-4-1"><input id="odds341" placeholder="3-4-1">
    </div>
  </div>

  <div class="card">
    <button onclick="runAI()">AI予想</button>
  </div>

  <div class="card">
    <div id="result">結果待ち</div>
  </div>
</div>

<script>
const TRACK_BIAS={"桐生":{in:56,bias:[12,5,3,1,0,0]},"戸田":{in:48,bias:[7,9,7,5,0,0]},"江戸川":{in:43,bias:[4,9,10,8,0,0]},"平和島":{in:51,bias:[9,6,4,3,0,0]},"多摩川":{in:54,bias:[10,6,4,2,0,0]},"浜名湖":{in:53,bias:[10,6,4,2,0,0]},"蒲郡":{in:57,bias:[13,5,3,1,0,0]},"常滑":{in:56,bias:[12,5,3,1,0,0]},"津":{in:54,bias:[10,6,4,2,0,0]},"三国":{in:55,bias:[11,6,3,2,0,0]},"びわこ":{in:53,bias:[10,6,4,2,0,0]},"住之江":{in:52,bias:[9,6,4,3,0,0]},"尼崎":{in:55,bias:[11,6,3,2,0,0]},"鳴門":{in:57,bias:[13,5,3,1,0,0]},"丸亀":{in:58,bias:[14,5,3,1,0,0]},"児島":{in:54,bias:[10,6,4,2,0,0]},"宮島":{in:55,bias:[11,6,3,2,0,0]},"徳山":{in:58,bias:[14,5,3,1,0,0]},"下関":{in:57,bias:[13,5,3,1,0,0]},"若松":{in:56,bias:[12,5,3,1,0,0]},"芦屋":{in:58,bias:[14,5,3,1,0,0]},"福岡":{in:55,bias:[11,6,3,2,0,0]},"唐津":{in:57,bias:[13,5,3,1,0,0]},"大村":{in:60,bias:[16,5,3,1,0,0]}};

function makeInputs(){
  let html="";
  for(let i=1;i<=6;i++){
    html += '<div class="grid"><div class="cap c'+i+'">'+i+'</div><input id="rate'+i+'" inputmode="decimal" pattern="[0-9.]*"><input id="m2'+i+'" inputmode="decimal" pattern="[0-9.]*"><input id="st'+i+'" inputmode="decimal" pattern="[0-9.]*"><input id="tenji'+i+'" inputmode="decimal" pattern="[0-9.]*"><select id="cls'+i+'"><option>A1</option><option>A2</option><option>B1</option><option>B2</option></select></div>';
  }
  document.getElementById("inputs").innerHTML=html;
}
function classBonus(c){return c==="A1"?12:c==="A2"?8:c==="B1"?4:0;}
function trackBias(track,boat){return (TRACK_BIAS[track]&&TRACK_BIAS[track].bias[boat-1])||0;}
function getInRate(track){return (TRACK_BIAS[track]&&TRACK_BIAS[track].in)||55;}
function oddsValue(bet,idx){const el=document.getElementById("odds"+bet.replace(/-/g,"")); const odds=el?(+el.value||0):0; return odds?odds/(idx+1):0;}

function runAI(){
  const track=document.getElementById("track").value;
  const budget=+document.getElementById("budget").value||0;
  let arr=[];

  for(let i=1;i<=6;i++){
    const rate=+document.getElementById("rate"+i).value||0;
    const m2=+document.getElementById("m2"+i).value||0;
    const st=+document.getElementById("st"+i).value||0;
    const tenji=+document.getElementById("tenji"+i).value||0;
    const cls=document.getElementById("cls"+i).value;
    let score=rate*10+m2*0.8+(st>0?(0.20-st)*40:0)+(tenji>0?(7-tenji)*10:0)+classBonus(cls)+trackBias(track,i);
    arr.push({boat:i,score:score,st:st,tenji:tenji,m2:m2,rate:rate,cls:cls});
  }

  const tenjiSorted=arr.filter(x=>x.tenji>0).slice().sort((a,b)=>a.tenji-b.tenji);
  const rankMap={}; tenjiSorted.forEach((x,i)=>rankMap[x.boat]=i+1);

  arr=arr.map(x=>{
    let s=x.score;
    const tenjiRank=rankMap[x.boat]||99;
    if(x.st>0&&x.st<=0.13&&tenjiRank<=2) s+=15;
    if(x.st>0&&x.st<=0.14&&x.m2>=35) s+=8;
    return {boat:x.boat,score:s,st:x.st,tenji:x.tenji,m2:x.m2,rate:x.rate,cls:x.cls,tenjiRank:tenjiRank};
  }).sort((a,b)=>b.score-a.score);

  const fastST=arr.filter(x=>x.st>0&&x.st<=0.13);
  const topTenji=arr.filter(x=>x.tenji>0).slice().sort((a,b)=>a.tenji-b.tenji);
  const topMotor=arr.slice().sort((a,b)=>b.m2-a.m2);

  let scenario="イン逃げ", attacker=arr[0].boat;
  if(arr[0].boat!==1) scenario="波乱";
  if(fastST.length>=2 && (((topTenji[0])&&(topTenji[0].boat===3||topTenji[0].boat===4)) || ((topMotor[0])&&(topMotor[0].boat===3||topMotor[0].boat===4)))){
    scenario="まくり・差し警戒";
    attacker=(topTenji[0]&&(topTenji[0].boat===3||topTenji[0].boat===4))?topTenji[0].boat:topMotor[0].boat;
  }
  if(arr[0].boat===1 && getInRate(track)>=58 && (arr[0].st===0||arr[0].st<=0.15)){scenario="イン逃げ濃厚"; attacker=1;}

  let diff=arr[0].score-arr[2].score;
  let manshu=0;
  if(diff<30) manshu+=35;
  if(arr[0].boat!==1) manshu+=20;
  if(fastST.length>=2) manshu+=15;
  if(topTenji.length>=2 && (topTenji[1].tenji-topTenji[0].tenji)>=0.04) manshu+=10;
  if(arr[0].boat===1 && getInRate(track)>=58) manshu-=10;
  manshu=Math.max(0,Math.min(100,manshu));
  const inRate=getInRate(track);

  let raceLevel="見送り";
  if(diff>40) raceLevel="勝負";
  else if(diff>25) raceLevel="準勝負";
  else if(manshu>=55) raceLevel="穴注意";

  let mainBets=[arr[0].boat+"-"+arr[1].boat+"-"+arr[2].boat,arr[0].boat+"-"+arr[2].boat+"-"+arr[1].boat,arr[1].boat+"-"+arr[0].boat+"-"+arr[2].boat];
  let subBets=[arr[1].boat+"-"+arr[2].boat+"-"+arr[0].boat,arr[0].boat+"-"+arr[1].boat+"-"+(arr[3]?arr[3].boat:arr[2].boat),arr[0].boat+"-"+(arr[3]?arr[3].boat:arr[2].boat)+"-"+arr[1].boat];
  let holeBets=manshu>=55?[arr[2].boat+"-"+arr[0].boat+"-"+arr[1].boat,(arr[3]?arr[3].boat:arr[2].boat)+"-"+arr[0].boat+"-"+arr[2].boat]:[arr[0].boat+"-"+arr[2].boat+"-"+(arr[3]?arr[3].boat:arr[1].boat)];

  if(scenario.indexOf("まくり")>=0){
    const extra=attacker+"-"+arr[0].boat+"-"+arr[1].boat;
    if(!mainBets.includes(extra)&&!subBets.includes(extra)&&!holeBets.includes(extra)) holeBets.push(extra);
  }

  mainBets=[...new Set(mainBets)].slice(0,3);
  subBets=[...new Set(subBets)].slice(0,3);
  holeBets=[...new Set(holeBets)].slice(0,2);

  const allBets=[
    ...mainBets.map((b,i)=>({bet:b,bucket:"本線",cls:"good",mult:3,value:oddsValue(b,i)})),
    ...subBets.map((b,i)=>({bet:b,bucket:"抑え",cls:"tip",mult:2,value:oddsValue(b,i+3)})),
    ...holeBets.map((b,i)=>({bet:b,bucket:"穴",cls:"warn",mult:1,value:oddsValue(b,i+6)}))
  ].sort((a,b)=>b.value-a.value);

  const totalUnits=mainBets.length*3+subBets.length*2+holeBets.length;
  const unit=(totalUnits>0&&budget>0)?Math.floor(budget/totalUnits):0;

  let markComment="";
  const one=arr.find(x=>x.boat===1), two=arr.find(x=>x.boat===2), four=arr.find(x=>x.boat===4), six=arr.find(x=>x.boat===6);
  if(four && four.st>0 && four.st<=0.13) markComment+="④がカドから先制を狙いやすい。";
  if(one && one.st>=0.18) markComment+="①はスタートで後手を踏みやすく、包まれる可能性あり。";
  if(two && two.m2<20) markComment+="②は差し残しより連下評価。";
  if(six && six.m2>=35) markComment+="⑥は機力上位で展開突きの3着注意。";
  if(topTenji.length>0 && (topTenji[0].boat===3 || topTenji[0].boat===4)) markComment+="外寄りの展示気配が良く、1マークで攻め筋が出やすい。";
  if(markComment==="") markComment="イン主体の通常展開。";

  let winPath="";
  if(attacker!==arr[0].boat && scenario.indexOf("まくり")>=0) winPath=attacker+"が仕掛けて、"+arr[0].boat+"が展開を突く勝ち筋。";
  else if(arr[0].boat===1 && scenario.indexOf("イン")>=0) winPath="①が先マイして押し切る勝ち筋。";
  else winPath=arr[0].boat+"号艇が総合力で押し切る形。";

  const aiRankTable='<table class="table"><thead><tr><th>順位</th><th>艇</th><th>AI値</th></tr></thead><tbody>'+arr.map((x,i)=>'<tr><td>'+(i+1)+'</td><td>'+x.boat+'</td><td>'+x.score.toFixed(1)+'</td></tr>').join('')+'</tbody></table>';

  document.getElementById("result").innerHTML=
    '<h3>本命：'+arr[0].boat+'号艇</h3>'+
    '<div class="badge good">展開：'+scenario+'</div>'+
    '<div class="badge warn">万舟率：'+manshu+'%</div>'+
    '<div class="badge gold">イン逃げ率：'+inRate+'%</div>'+
    '<div class="badge '+(raceLevel==="勝負"?"gold":raceLevel==="準勝負"?"good":"warn")+'">勝負度：'+raceLevel+'</div>'+
    '<div class="small">ボート専用ページです。ここでは予想と説明に集中します。</div>'+
    '<div class="commentbox"><b>1マーク展開予想：</b><br>'+markComment+'</div>'+
    '<div class="commentbox"><b>勝ち筋の自動説明：</b><br>'+winPath+'</div>'+
    '<div class="commentbox"><b>AI値順位：</b>'+aiRankTable+'</div>'+
    '<div class="commentbox"><b>買い目：</b><br>'+allBets.map(o=>'<div class="badge '+o.cls+'">'+o.bucket+' '+o.bet+(budget>0?' / '+(unit*o.mult)+'円':'')+(o.value>0?' / 妙味'+o.value.toFixed(1):'')+'</div>').join('')+'</div>'+
    (budget>0?'<div class="money small">予算 '+budget+'円 / 1単位 '+unit+'円</div>':'');
}

function clearData(){
  document.getElementById("track").selectedIndex=0;
  document.getElementById("budget").value="";
  ["123","132","213","231","312","412","124","142","134","214","241","341"].forEach(function(id){
    const el=document.getElementById("odds"+id); if(el) el.value="";
  });
  for(let i=1;i<=6;i++){
    document.getElementById("rate"+i).value="";
    document.getElementById("m2"+i).value="";
    document.getElementById("st"+i).value="";
    document.getElementById("tenji"+i).value="";
    document.getElementById("cls"+i).value="A1";
  }
  document.getElementById("result").innerHTML="結果待ち";
}
makeInputs();
</script>
</body>
</html>
