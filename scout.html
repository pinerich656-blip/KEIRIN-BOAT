
<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>競輪×ボート 最強統合AI 勝負レース抽出版</title>
<style>
:root{
  --bg:#0b1220; --card:#111827; --line:#24324a; --text:#eef4ff;
  --blue:#2563eb; --cyan:#06b6d4; --green:#16a34a; --red:#dc2626; --gold:#f59e0b; --violet:#7c3aed;
}
*{box-sizing:border-box}
body{margin:0;background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif}
.app{max-width:430px;margin:auto;padding:10px 10px 30px}
.header{padding:18px 14px 22px;margin:-10px -10px 10px;border-bottom-left-radius:24px;border-bottom-right-radius:24px;background:linear-gradient(135deg,#0f172a,#1d4ed8 58%,#06b6d4);box-shadow:0 12px 26px rgba(0,0,0,.35)}
.header h1{margin:0;font-size:24px}
.header p{margin:6px 0 0;font-size:12px;opacity:.94}
.card{background:linear-gradient(180deg,rgba(18,29,52,.98),rgba(11,20,36,.98));border:1px solid var(--line);border-radius:16px;padding:14px;margin:10px 0}
.row{display:flex;gap:8px}.row>*{flex:1}
button,input,select{width:100%;padding:10px;margin-top:6px;border:none;border-radius:10px;box-sizing:border-box;font-size:16px}
button{background:linear-gradient(135deg,var(--blue),var(--cyan));color:#fff;font-weight:800}
input,select{background:#020617;color:#fff}
.tab{display:flex;gap:8px}
.tab button{margin-top:0}
.activeBoat{background:linear-gradient(135deg,#0891b2,#2563eb)}
.activeKeirin{background:linear-gradient(135deg,#7c3aed,#2563eb)}
.badge{display:inline-block;padding:6px 10px;border-radius:999px;margin:4px;font-weight:800}
.good{background:var(--green)}
.warn{background:var(--red)}
.gold{background:var(--gold);color:#111}
.tip{background:var(--violet)}
.small{font-size:12px;opacity:.86;line-height:1.6}
.gridBoat{display:grid;grid-template-columns:38px repeat(3,1fr);gap:6px;align-items:center;margin-top:6px}
.gridKeirin{display:grid;grid-template-columns:38px 1.2fr 1fr 1fr;gap:6px;align-items:center;margin-top:6px}
.cap{height:36px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-weight:900}
.c1{background:#fff;color:#000}.c2{background:#000;color:#fff}.c3{background:#ef4444;color:#fff}.c4{background:#2563eb;color:#fff}.c5{background:#f59e0b;color:#111}.c6{background:#16a34a;color:#fff}
.listItem{padding:10px 0;border-bottom:1px solid #223454}
.listItem:last-child{border-bottom:none}
.section{font-size:14px;font-weight:800;margin-bottom:6px}
</style>
</head>
<body>
<div class="app">
  <div class="header">
    <h1>最強統合AI</h1>
    <p>競輪×ボート / 勝負レース抽出つき</p>
  </div>

  <div class="card">
    <div class="tab">
      <button id="boatBtn" class="activeBoat" onclick="setMode('boat')">🚤 ボート</button>
      <button id="keirinBtn" onclick="setMode('keirin')">🚴 競輪</button>
    </div>
    <div class="small">どちらの競技でもレースを複数追加して、最後に「勝負レース抽出」を押します。</div>
  </div>

  <div class="card" id="boatArea">
    <div class="section">ボート入力</div>
    <input id="boatRaceName" placeholder="例: 常滑 7R">
    <div class="gridBoat">
      <div class="small">艇</div><div class="small">全国</div><div class="small">M2</div><div class="small">ST</div>
    </div>
    <div id="boatInputs"></div>
    <div class="row" style="margin-top:8px">
      <button onclick="addBoatRace()">ボート追加</button>
      <button onclick="clearBoatForm()" style="background:#374151">入力クリア</button>
    </div>
  </div>

  <div class="card" id="keirinArea" style="display:none">
    <div class="section">競輪入力</div>
    <input id="keirinRaceName" placeholder="例: 西武園 9R">
    <div class="gridKeirin">
      <div class="small">車</div><div class="small">脚質</div><div class="small">指数</div><div class="small">ライン</div>
    </div>
    <div id="keirinInputs"></div>
    <div class="row" style="margin-top:8px">
      <button onclick="addKeirinRace()">競輪追加</button>
      <button onclick="clearKeirinForm()" style="background:#374151">入力クリア</button>
    </div>
  </div>

  <div class="card">
    <div class="section">登録レース</div>
    <div id="savedList" class="small">まだありません。</div>
    <div class="row" style="margin-top:8px">
      <button onclick="scanRaces()">勝負レース抽出</button>
      <button onclick="resetAll()" style="background:#374151">全消去</button>
    </div>
  </div>

  <div class="card">
    <div class="section">抽出結果</div>
    <div id="results">結果待ち</div>
  </div>
</div>

<script>
let mode = "boat";
const saved = [];

function setMode(m){
  mode = m;
  document.getElementById("boatArea").style.display = m==="boat" ? "block" : "none";
  document.getElementById("keirinArea").style.display = m==="keirin" ? "block" : "none";
  document.getElementById("boatBtn").className = m==="boat" ? "activeBoat" : "";
  document.getElementById("keirinBtn").className = m==="keirin" ? "activeKeirin" : "";
}

function buildBoatInputs(){
  let html = "";
  for(let i=1;i<=6;i++){
    html += `<div class="gridBoat">
      <div class="cap c${i}">${i}</div>
      <input id="br${i}" inputmode="decimal" pattern="[0-9.]*">
      <input id="bm${i}" inputmode="decimal" pattern="[0-9.]*">
      <input id="bs${i}" inputmode="decimal" pattern="[0-9.]*">
    </div>`;
  }
  document.getElementById("boatInputs").innerHTML = html;
}

function buildKeirinInputs(){
  let html = "";
  const styles = ["逃","両","追","自在"];
  for(let i=1;i<=9;i++){
    html += `<div class="gridKeirin">
      <div class="cap" style="background:#1f2937">${i}</div>
      <select id="kkind${i}">
        ${styles.map(s=>`<option>${s}</option>`).join("")}
      </select>
      <input id="kscore${i}" inputmode="decimal" pattern="[0-9.]*">
      <input id="kline${i}" placeholder="例: A">
    </div>`;
  }
  document.getElementById("keirinInputs").innerHTML = html;
}

function clearBoatForm(){
  document.getElementById("boatRaceName").value = "";
  for(let i=1;i<=6;i++){
    document.getElementById("br"+i).value = "";
    document.getElementById("bm"+i).value = "";
    document.getElementById("bs"+i).value = "";
  }
}

function clearKeirinForm(){
  document.getElementById("keirinRaceName").value = "";
  for(let i=1;i<=9;i++){
    document.getElementById("kscore"+i).value = "";
    document.getElementById("kline"+i).value = "";
    document.getElementById("kkind"+i).selectedIndex = 0;
  }
}

function addBoatRace(){
  const name = document.getElementById("boatRaceName").value.trim();
  if(!name){ alert("レース名を入れてください"); return; }

  const rows = [];
  for(let i=1;i<=6;i++){
    const rate = +document.getElementById("br"+i).value || 0;
    const m2 = +document.getElementById("bm"+i).value || 0;
    const st = +document.getElementById("bs"+i).value || 0;
    const ai = rate*10 + m2*0.8 + (st>0 ? (0.20-st)*40 : 0) + (i===1 ? 10 : 0);
    rows.push({boat:i, ai, rate, m2, st});
  }
  rows.sort((a,b)=>b.ai-a.ai);
  const spread = rows[0].ai - rows[2].ai;
  const fast = rows.filter(x=>x.st>0 && x.st<=0.13).length;
  let level = "見送り";
  if(spread > 35) level = "勝負";
  else if(spread > 20) level = "準勝負";
  if(fast >= 2 || rows[0].boat !== 1) level = level==="見送り" ? "穴注意" : level;

  saved.push({
    type:"boat",
    name,
    top: rows[0].boat + "号艇",
    score: Math.round(rows[0].ai - rows[1].ai),
    level,
    note: `本命 ${rows[0].boat} / 上位差 ${spread.toFixed(1)} / 速ST ${fast}艇`
  });
  refreshSaved();
  clearBoatForm();
}

function addKeirinRace(){
  const name = document.getElementById("keirinRaceName").value.trim();
  if(!name){ alert("レース名を入れてください"); return; }

  const rows = [];
  const lineCount = {};
  for(let i=1;i<=9;i++){
    const score = +document.getElementById("kscore"+i).value || 0;
    const kind = document.getElementById("kkind"+i).value;
    const line = document.getElementById("kline"+i).value.trim();
    let ai = score + (kind==="逃" ? 5 : kind==="両" ? 3 : 1);
    rows.push({num:i, ai, score, kind, line});
    if(line){ lineCount[line] = (lineCount[line]||0)+1; }
  }
  rows.sort((a,b)=>b.ai-a.ai);
  const spread = rows[0].ai - rows[2].ai;
  const bigLine = Object.values(lineCount).some(v => v >= 3);
  let level = "見送り";
  if(spread > 12) level = "勝負";
  else if(spread > 7) level = "準勝負";
  if(bigLine && rows[0].kind==="逃") level = level==="見送り" ? "穴注意" : level;

  saved.push({
    type:"keirin",
    name,
    top: rows[0].num + "番",
    score: Math.round((rows[0].ai - rows[1].ai)*10)/10,
    level,
    note: `本命 ${rows[0].num} / 上位差 ${spread.toFixed(1)} / ライン警戒 ${bigLine ? "あり" : "なし"}`
  });
  refreshSaved();
  clearKeirinForm();
}

function refreshSaved(){
  const el = document.getElementById("savedList");
  if(!saved.length){
    el.textContent = "まだありません。";
    return;
  }
  el.innerHTML = saved.map((r,i)=>`
    <div class="listItem">
      <span class="badge ${r.type==="boat"?"tip":"gold"}">${r.type==="boat"?"ボート":"競輪"}</span>
      <b>${i+1}. ${r.name}</b><br>
      <span class="badge ${r.level==="勝負"?"gold":r.level==="準勝負"?"good":"warn"}">${r.level}</span>
      <span class="badge tip">${r.top}</span>
      <div class="small">${r.note}</div>
    </div>
  `).join("");
}

function scanRaces(){
  if(!saved.length){
    document.getElementById("results").textContent = "先にレースを追加してください。";
    return;
  }
  const weight = x => x.level==="勝負" ? 3 : x.level==="準勝負" ? 2 : x.level==="穴注意" ? 1 : 0;
  const ranked = [...saved].sort((a,b)=> (weight(b)-weight(a)) || (b.score-a.score));

  const picked = ranked.filter(x => x.level !== "見送り").slice(0,5);
  if(!picked.length){
    document.getElementById("results").innerHTML = '<div class="small">今日は見送り寄りです。</div>';
    return;
  }

  document.getElementById("results").innerHTML = picked.map((r,i)=>`
    <div class="listItem">
      <div>
        <span class="badge ${r.type==="boat"?"tip":"gold"}">${r.type==="boat"?"ボート":"競輪"}</span>
        <b>${i+1}位 ${r.name}</b>
      </div>
      <div>
        <span class="badge ${r.level==="勝負"?"gold":r.level==="準勝負"?"good":"warn"}">${r.level}</span>
        <span class="badge tip">本命 ${r.top}</span>
        <span class="badge ${r.score>=15?"gold":"good"}">信頼差 ${r.score}</span>
      </div>
      <div class="small">${r.note}</div>
    </div>
  `).join("");
}

function resetAll(){
  saved.length = 0;
  refreshSaved();
  document.getElementById("results").textContent = "結果待ち";
  clearBoatForm();
  clearKeirinForm();
}

buildBoatInputs();
buildKeirinInputs();
</script>
</body>
</html>
