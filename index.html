<textarea id="raw" rows="18" placeholder="ここに貼り付け"></textarea>

4-2-1 = 18.4
1-2-4 = 12.8"></textarea>

</div>
<div class="card">
  <h2>デバッグ</h2>
  <pre id="debug" style="white-space:pre-wrap;word-break:break-all;color:#93c5fd"></pre>
</div>
 <div id="out"></div>
<script>

document.getElementById('sampleBtn').addEventListener('click', ()=>{
  document.getElementById('raw').value = sample;
  document.getElementById('lineInput').value = '2-4 / 1 / 3 / 5 / 6 / 7';
  document.getElementById('msg').textContent = 'サンプルを入れました。';

function normalizeText(s){
  return String(s || '')
    .replace(/[\u2028\u2029]/g, '\n')
    .replace(/[\u00A0\u200B-\u200D\u2060\uFEFF]/g, ' ')
    .replace(/\r/g, '\n')
    .replace(/　/g, ' ');
}

function cleanLine(s){
  return normalizeText(s).replace(/[ \t]+/g, ' ').trim();
}

function normalizedHeaderKey(s){
  return cleanLine(s).replace(/[\s/]+/g, '').replace(/Ｂ/g,'B');
}

function isHeaderLine(s){
  const t = normalizedHeaderKey(s);
  return ['枠番','車番','選手名','府県級班前現脚質','競走得点','逃','捲','差','マ','B','調子'].includes(t);
}

function isInfoLine(s){
  return /\/.+\//.test(s);
}

function parseRaw(text){
  const normalized = String(text || '')
    .replace(/[\u2028\u2029]/g, '\n')
    .replace(/[\u00A0\u200B-\u200D\u2060\uFEFF]/g, ' ')
    .replace(/\r/g, '\n')
    .replace(/　/g, ' ');

  const rawLines = normalized
    .split('\n')
    .map(s => s.replace(/[ \t]+/g, ' ').trim())
    .filter(Boolean);

  const filtered = rawLines.filter(line => {
    const t = line.replace(/\s+/g, '').replace(/Ｂ/g, 'B');
    if ([
      '枠', '番', '車', '選手名', '競走得点', '逃', '捲', '差', 'マ', 'B', '調', '子',
      '枠番', '車番', '調子', '府県級班前現脚質'
    ].includes(t)) return false;
    if (t === '府県/級班前現/脚質'.replace(/\s+/g, '')) return false;
    return true;
  });

  const racers = [];
  let i = 0;

  while (i < filtered.length) {
    if (!/^\d+$/.test(filtered[i])) {
      i++;
      continue;
    }

    const carNo = parseInt(filtered[i], 10);
    const name = filtered[i + 1] || '';
    const info = filtered[i + 2] || '';
    const numLine = filtered[i + 3] || '';

    if (!name || !/\/.+\//.test(info)) {
      i++;
      continue;
    }

    // 数字6個を1行から読む
    const nums = numLine.split(' ').filter(Boolean);

    if (nums.length >= 6 &&
        /^-?\d+(?:\.\d+)?$/.test(nums[0]) &&
        /^-?\d+$/.test(nums[1]) &&
        /^-?\d+$/.test(nums[2]) &&
        /^-?\d+$/.test(nums[3]) &&
        /^-?\d+$/.test(nums[4]) &&
        /^-?\d+$/.test(nums[5])) {

      const safeName = name.replace(/追加/g, '').trim();
      const parts = info.split('/').map(v => v.trim());
      const pref = (parts[0] || '').replace(/\s+/g, '');
      const style = ((parts[2] || '両').match(/[逃両追]/) || ['両'])[0];

      racers.push({
        car_no: carNo,
        name: safeName,
        pref,
        style,
        score: parseFloat(nums[0]) || 0,
        nige: parseInt(nums[1], 10) || 0,
        makuri: parseInt(nums[2], 10) || 0,
        sashi: parseInt(nums[3], 10) || 0,
        mark: parseInt(nums[4], 10) || 0,
        b: parseInt(nums[5], 10) || 0
      });

      i += 4;
      continue;
    }

    // 旧形式: 数字が縦並び6行
    const score = filtered[i + 3] || '';
    const nige = filtered[i + 4] || '';
    const makuri = filtered[i + 5] || '';
    const sashi = filtered[i + 6] || '';
    const mark = filtered[i + 7] || '';
    const b = filtered[i + 8] || '';

    if (
      /^-?\d+(?:\.\d+)?$/.test(score) &&
      /^-?\d+$/.test(nige) &&
      /^-?\d+$/.test(makuri) &&
      /^-?\d+$/.test(sashi) &&
      /^-?\d+$/.test(mark) &&
      /^-?\d+$/.test(b)
    ) {
      const safeName = name.replace(/追加/g, '').trim();
      const parts = info.split('/').map(v => v.trim());
      const pref = (parts[0] || '').replace(/\s+/g, '');
      const style = ((parts[2] || '両').match(/[逃両追]/) || ['両'])[0];

      racers.push({
        car_no: carNo,
        name: safeName,
        pref,
        style,
        score: parseFloat(score) || 0,
        nige: parseInt(nige, 10) || 0,
        makuri: parseInt(makuri, 10) || 0,
        sashi: parseInt(sashi, 10) || 0,
        mark: parseInt(mark, 10) || 0,
        b: parseInt(b, 10) || 0
      });

      i += 9;
      continue;
    }

    i++;
  }

  return racers.sort((a, b) => a.car_no - b.car_no);
}

  function parseLines(lineInput, racers){
  const map = {};
  const txt = cleanLine(lineInput);

  if(!txt){
    racers.forEach((r, idx) => {
      map[r.car_no] = String.fromCharCode(65 + idx);
    });
    return map;
  }

  txt.split('/').map(cleanLine).filter(Boolean).forEach((grp, idx)=>{
    const key = String.fromCharCode(65 + idx);
    grp.split('-').map(cleanLine).filter(Boolean).forEach(n => {
      map[parseInt(n,10)] = key;
    });
  });

  racers.forEach((r, idx)=>{
    if(!map[r.car_no]) map[r.car_no] = 'Z' + idx;
  });

  return map;
}

function enrich(racers, lineInput){
  const lineMap = parseLines(lineInput, racers);
  racers.forEach(r => r.line = lineMap[r.car_no]);

  const grouped = {};
  racers.forEach(r => {
    (grouped[r.line] ??= []).push(r);
  });

  const rawGroups = cleanLine(lineInput) ? lineInput.split('/').map(cleanLine) : [];

  Object.values(grouped).forEach(group => {
    group.sort((a,b)=>a.car_no-b.car_no);

    rawGroups.forEach(grp => {
      const nums = grp.split('-').map(v=>parseInt(cleanLine(v),10)).filter(Number.isFinite);
      const subset = nums.map(n => group.find(g => g.car_no === n)).filter(Boolean);
      if (subset.length === group.length && subset.length > 0) {
        group.splice(0, group.length, ...subset);
      }
    });

    const avg = group.reduce((s,r)=>s+r.score,0) / group.length;

    group.forEach((r, idx) => {
      r.line_len = group.length;
      r.line_pos = idx + 1;
      r.is_head = idx === 0 ? 1 : 0;
      r.line_strength = avg;

      r.lead =
        r.score * 0.22 +
        r.b * 4.8 +
        r.nige * 3.5 +
        r.makuri * 2.0 +
        (r.style === '逃' ? 10 : 0) +
        (r.is_head ? 8 : -3) +
        r.line_len * 2.2;

      r.chase =
        r.score * 0.26 +
        r.sashi * 2.7 +
        r.mark * 2.6 +
        (r.line_pos === 2 ? 14 : 0) +
        (r.line_pos === 3 ? 6 : 0) +
        r.line_strength * 0.2 +
        (r.style === '追' ? 8 : 0);

      r.attack =
        r.score * 0.22 +
        r.makuri * 3.2 +
        r.sashi * 2.0 +
        r.nige * 1.4 +
        (r.style === '両' ? 7 : 0) +
        (r.line_len === 1 ? 4 : 0);
    });
  });

  return racers.sort((a,b)=>a.car_no-b.car_no);
}

function parseOdds(text){
  const map = {};
  normalizeText(text).split('\n').forEach(line => {
    const m = cleanLine(line).match(/(\d-\d-\d)\s*=\s*([0-9]+(?:\.[0-9]+)?)/);
    if (m) map[m[1]] = parseFloat(m[2]);
  });
  return map;
}

function prob(a,b,c){
  const total = a.lead + b.chase + c.attack;
  return Math.max(0.01, Math.min(total / 300, 0.6));
}

function kelly(p, odds, bankroll = 10000){
  const b = odds - 1;
  if (b <= 0) return 0;
  let f = ((b * p) - (1 - p)) / b;
  f = Math.max(0, f) * 0.5;
  let bet = Math.floor(bankroll * f / 100) * 100;
  return Math.max(0, Math.min(bet, bankroll * 0.2));
}

function buildTickets(racers, oddsMap){
  const tickets = [];
  for (let i=0;i<racers.length;i++) {
    for (let j=0;j<racers.length;j++) {
      for (let k=0;k<racers.length;k++) {
        if (i===j || i===k || j===k) continue;
        const a = racers[i], b = racers[j], c = racers[k];
        const ticket = `${a.car_no}-${b.car_no}-${c.car_no}`;
        const p = prob(a,b,c);
        const odds = oddsMap[ticket] || 0;
        const ev = odds ? p * odds : 0;
        tickets.push({
          ticket,
          p,
          odds,
          ev,
          bet: odds ? kelly(p, odds) : 0
        });
      }
    }
  }
  tickets.sort((x,y)=>y.ev-x.ev || y.p-x.p);
  return tickets.slice(0, 20);
}

function cls(ev){
  return ev >= 1.2 ? 'good' : ev >= 1.0 ? 'mid' : 'bad';
}

function render(racers, tickets){
  let html = '<div class="card"><h2>解析結果</h2><table class="table"><tr><th>車</th><th>選手</th><th>脚質</th><th>ライン</th><th>主導</th><th>番手</th><th>捲り</th></tr>';
  racers.forEach(r => {
    html += `<tr><td>${r.car_no}</td><td>${r.name}</td><td>${r.style}</td><td>${r.line}</td><td>${r.lead.toFixed(1)}</td><td>${r.chase.toFixed(1)}</td><td>${r.attack.toFixed(1)}</td></tr>`;
  });
  html += '</table></div>';

  html += '<div class="card"><h2>買い目候補</h2>';
  tickets.forEach((t, idx) => {
    html += `<div class="ticket"><div><strong>${idx===0?'◎':idx===1?'○':idx===2?'▲':'△'} ${t.ticket}</strong></div><div class="${cls(t.ev)}">EV ${t.ev.toFixed(2)} / 確率 ${t.p.toFixed(3)} / オッズ ${t.odds || '-'} / 推奨 ${t.bet}円</div></div>`;
  });
  html += '</div>';

  document.getElementById('out').innerHTML = html;
}

document.getElementById('analyzeBtn').addEventListener('click', ()=>{
  const msg = document.getElementById('msg');
  msg.textContent = '';

  try {
    const rawValue = document.getElementById('raw').value;
    const normalized = String(rawValue || '')
      .replace(/[\u2028\u2029]/g, '\n')
      .replace(/[\u00A0\u200B-\u200D\u2060\uFEFF]/g, ' ')
      .replace(/\r/g, '\n')
      .replace(/　/g, ' ');

    document.getElementById('debug').textContent =
      '--- 貼り付け後の正規化文字列 ---\n' + normalized;

    const racers = parseRaw(rawValue);

    if (racers.length < 3) {
      msg.textContent = '解析できませんでした。貼り付け形式が崩れているか、数字が足りません。';
      document.getElementById('out').innerHTML = '';
      return;
    }

    const enriched = enrich(racers, document.getElementById('lineInput').value);
    const tickets = buildTickets(enriched, parseOdds(document.getElementById('odds').value));

    msg.textContent = `${racers.length}名を解析しました。`;
    render(enriched, tickets);
  } catch (e) {
    msg.textContent = '解析エラー: ' + e.message;
    document.getElementById('out').innerHTML = '';
  }
});
</script>
