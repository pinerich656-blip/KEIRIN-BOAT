<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>KEIRIN AI PRO</title>
<meta name="theme-color" content="#0b1220">
<style>
:root{
  --line:#243a63; --text:#edf4ff; --muted:#9fb3d9;
  --blue:#2563eb; --cyan:#06b6d4; --green:#16a34a; --gold:#f59e0b; --red:#dc2626; --violet:#7c3aed;
}
*{box-sizing:border-box}
body{
  margin:0;color:var(--text);
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
  background:
    radial-gradient(circle at top left,#16335f 0%,#08101c 42%),
    linear-gradient(180deg,#08101c,#091221);
}
.app{max-width:430px;margin:auto;padding:0 10px 30px}
.header{
  padding:18px 14px 22px;margin:0 -10px 10px;
  background:linear-gradient(135deg,#0f172a,#7c3aed 58%,#2563eb);
  border-bottom-left-radius:24px;border-bottom-right-radius:24px;
  box-shadow:0 12px 26px rgba(0,0,0,.35);
}
.header h1{margin:0;font-size:24px}
.header p{margin:6px 0 0;font-size:12px;opacity:.94}
.card{
  background:linear-gradient(180deg,rgba(18,29,52,.98),rgba(11,20,36,.98));
  border:1px solid var(--line);
  border-radius:16px;
  padding:14px;
  margin:10px 0;
}
.section{font-size:14px;font-weight:800;margin-bottom:8px}
.row{display:flex;gap:8px}.row>*{flex:1}
input,select,button{
  width:100%;padding:10px;margin-top:6px;border:none;border-radius:10px;
  box-sizing:border-box;font-size:16px
}
input,select{background:#020617;color:#fff}
button{background:linear-gradient(135deg,var(--violet),var(--blue));color:#fff;font-weight:800}
.btn-sub{background:linear-gradient(135deg,#475569,#334155)}
.grid{display:grid;grid-template-columns:34px 1.1fr 1fr 1fr;gap:6px;align-items:center;margin-top:6px}
.cap{
  height:38px;border-radius:8px;display:flex;align-items:center;justify-content:center;
  font-weight:900;background:#1f2937;color:#fff
}
.badge{display:inline-block;padding:6px 10px;border-radius:999px;margin:4px;font-weight:800}
.good{background:var(--green)} .warn{background:var(--red)} .tip{background:var(--violet)} .gold{background:var(--gold);color:#111}
.small{font-size:12px;color:var(--muted);line-height:1.6}
.commentbox{margin-top:10px;padding:12px;border-radius:12px;background:#0f172a;border:1px solid #243352;line-height:1.7}
.table{width:100%;border-collapse:collapse;margin-top:8px}
.table th,.table td{border-bottom:1px solid #223454;padding:8px 6px;text-align:center;font-size:13px}
.money{margin-top:10px;padding:10px;border-radius:12px;background:#0f172a}
.nav{display:flex;gap:8px}
.nav a{
  flex:1;text-align:center;text-decoration:none;color:#fff;font-weight:800;
  background:#111827;border:1px solid #29405f;border-radius:14px;padding:12px 8px;
}
.nav a.active{background:linear-gradient(135deg,#7c3aed,#2563eb)}
</style>
</head>
<body>
<div class="app">
  <div class="header">
    <h1>KEIRIN AI PRO</h1>
    <p>競輪専用 / ライン展開 / 勝ち筋説明 / AI値順位 / 資金配分</p>
  </div>

  <div class="card">
    <div class="nav">
      <a href="index.html">メニュー</a>
      <a href="boat.html">ボート</a>
      <a href="keirin.html" class="active">競輪</a>
      <a href="unified.html">統合</a>
    </div>
  </div>

  <div class="card">
    <div class="row">
      <button onclick="clearData()" class="btn-sub">全クリア</button>
    </div>
  </div>

  <div class="card">
    <div class="section">基本設定</div>
    <input id="raceName" placeholder="例: 西武園 9R">
    <input id="budget" inputmode="numeric" placeholder="予算（例: 3000）">
    <div class="small">入力項目：脚質 / 指数 / ライン。ラインは A / B / C などで入力。</div>
  </div>

  <div class="card">
    <div class="section">入力</div>
    <div class="grid">
      <div>車</div><div>脚質</div><div>指数</div><div>ライン</div>
    </div>
    <div id="inputs"></div>
  </div>

  <div class="card">
    <button onclick="runAI()">AI予想</button>
  </div>

  <div class="card">
    <div id="result">結果待ち</div>
  </div>
</div>

<script>
function styleBonus(style){
  return style==="逃" ? 6 : style==="両" ? 4 : style==="自在" ? 3 : 1;
}
function styleText(style){
  return style==="逃" ? "先行主導" : style==="追" ? "差し脚" : style==="両" ? "自在に動ける" : "位置取り次第";
}
function makeInputs(){
  const styles=["逃","両","追","自在"];
  let html="";
  for(let i=1;i<=9;i++){
    html += '<div class="grid"><div class="cap">'+i+'</div><select id="kind'+i+'">'+styles.map(s=>'<option>'+s+'</option>').join('')+'</select><input id="score'+i+'" inputmode="decimal" pattern="[0-9.]*"><input id="line'+i+'" placeholder="A"></div>';
  }
  document.getElementById("inputs").innerHTML=html;
}

function runAI(){
  const budget = +document.getElementById("budget").value || 0;
  let rows=[], lineCount={};

  for(let i=1;i<=9;i++){
    const kind=document.getElementById("kind"+i).value;
    const score=+document.getElementById("score"+i).value||0;
    const line=document.getElementById("line"+i).value.trim();

    let ai = score + styleBonus(kind);
    if(kind==="逃" && score>=100) ai += 4;
    if(kind==="追" && score>=103) ai += 3;
    if(kind==="両" && score>=102) ai += 2;

    if(line) lineCount[line]=(lineCount[line]||0)+1;
    rows.push({num:i,kind,score,line,ai});
  }

  rows.sort((a,b)=>b.ai-a.ai);

  const diffTop3 = rows[0].ai - rows[2].ai;
  const diffTop2 = rows[0].ai - rows[1].ai;
  const hasStrongEscape = rows.some(x=>x.kind==="逃" && x.ai>=rows[0].ai-3);
  const hasBigLine = Object.values(lineCount).some(v=>v>=3);
  const mainLine = rows[0].line;
  const sameLineTop = mainLine ? rows.filter(x=>x.line===mainLine).map(x=>x.num) : [];

  let scenario = "力勝負";
  if(hasBigLine) scenario = "ライン決着寄り";
  if(hasStrongEscape) scenario = "先行主導";
  if(diffTop3 < 6) scenario = "混戦";

  let raceLevel = "見送り";
  if(diffTop3 > 12) raceLevel = "勝負";
  else if(diffTop3 > 7) raceLevel = "準勝負";
  else if(hasBigLine) raceLevel = "穴注意";

  let lineComment = "";
  if(hasBigLine) lineComment += "ラインの厚みがあり、番手差し・3番手残りに注意。";
  if(hasStrongEscape) lineComment += "先行型が主導権を握りやすい。";
  if(diffTop3 < 6) lineComment += "上位差が小さく波乱余地あり。";
  if(mainLine && sameLineTop.length>=2) lineComment += " 本命ラインは " + sameLineTop.join("-") + "。";
  if(lineComment==="") lineComment = "単騎の自力勝負寄り。";

  let winPath = "";
  if(rows[0].kind==="逃"){
    winPath = rows[0].num + "番が主導権を取って押し切る形。";
  }else if(rows[0].kind==="追" && rows[1].line && rows[1].line===rows[0].line){
    winPath = rows[1].num + "番が動いて、" + rows[0].num + "番が差し込む勝ち筋。";
  }else{
    winPath = rows[0].num + "番が展開を拾って伸びる形。";
  }

  let mainBets = [
    rows[0].num + "-" + rows[1].num + "-" + rows[2].num,
    rows[0].num + "-" + rows[2].num + "-" + rows[1].num
  ];
  let subBets = [
    rows[1].num + "-" + rows[0].num + "-" + rows[2].num,
    rows[0].num + "-" + rows[1].num + "-" + rows[3].num
  ];
  let holeBets = [
    rows[2].num + "-" + rows[0].num + "-" + rows[1].num
  ];

  if(hasBigLine && sameLineTop.length>=2){
    const lineBet = sameLineTop.slice(0,3);
    if(lineBet.length===3){
      const b = lineBet.join("-");
      if(!mainBets.includes(b) && !subBets.includes(b) && !holeBets.includes(b)) subBets.push(b);
    }
  }

  mainBets=[...new Set(mainBets)].slice(0,2);
  subBets=[...new Set(subBets)].slice(0,3);
  holeBets=[...new Set(holeBets)].slice(0,2);

  const totalUnits = mainBets.length*3 + subBets.length*2 + holeBets.length;
  const unit = (budget>0 && totalUnits>0) ? Math.floor(budget/totalUnits) : 0;

  const rankTable = '<table class="table"><thead><tr><th>順位</th><th>車番</th><th>AI値</th><th>脚質</th></tr></thead><tbody>' +
    rows.map((x,i)=>'<tr><td>'+(i+1)+'</td><td>'+x.num+'</td><td>'+x.ai.toFixed(1)+'</td><td>'+x.kind+'</td></tr>').join('') +
    '</tbody></table>';

  document.getElementById("result").innerHTML =
    '<h3>本命：'+rows[0].num+'番</h3>'+
    '<div class="badge good">展開：'+scenario+'</div>'+
    '<div class="badge '+(raceLevel==="勝負"?"gold":raceLevel==="準勝負"?"good":"warn")+'">勝負度：'+raceLevel+'</div>'+
    '<div class="badge tip">信頼差：'+diffTop2.toFixed(1)+'</div>'+
    '<div class="small">競輪専用ページです。ここではラインと勝ち筋の説明に集中します。</div>'+
    '<div class="commentbox"><b>ライン展開予想：</b><br>'+lineComment+'</div>'+
    '<div class="commentbox"><b>勝ち筋の自動説明：</b><br>'+winPath+' '+rows[0].num+'番は「'+styleText(rows[0].kind)+'」タイプ。</div>'+
    '<div class="commentbox"><b>AI値順位：</b>'+rankTable+'</div>'+
    '<div class="commentbox"><b>買い目：</b><br>'+
      mainBets.map(b=>'<div class="badge good">本線 '+b+(budget>0?' / '+(unit*3)+'円':'')+'</div>').join('')+
      subBets.map(b=>'<div class="badge tip">抑え '+b+(budget>0?' / '+(unit*2)+'円':'')+'</div>').join('')+
      holeBets.map(b=>'<div class="badge warn">穴 '+b+(budget>0?' / '+(unit*1)+'円':'')+'</div>').join('')+
    '</div>'+
    (budget>0?'<div class="money small">予算 '+budget+'円 / 1単位 '+unit+'円</div>':'');
}

function clearData(){
  document.getElementById("raceName").value="";
  document.getElementById("budget").value="";
  for(let i=1;i<=9;i++){
    document.getElementById("score"+i).value="";
    document.getElementById("line"+i).value="";
    document.getElementById("kind"+i).selectedIndex=0;
  }
  document.getElementById("result").innerHTML="結果待ち";
}
makeInputs();
</script>
</body>
</html>
