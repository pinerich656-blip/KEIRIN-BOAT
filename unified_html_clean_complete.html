<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>統合AI 司令塔</title>
<meta name="theme-color" content="#0b1220">
<style>
:root{
  --line:#243a63; --text:#edf4ff; --muted:#9fb3d9;
  --blue:#2563eb; --cyan:#06b6d4; --green:#16a34a; --gold:#f59e0b; --red:#dc2626; --violet:#7c3aed;
}
*{box-sizing:border-box}
body{
  margin:0;color:var(--text);
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
  background:
    radial-gradient(circle at top left,#16335f 0%,#08101c 42%),
    linear-gradient(180deg,#08101c,#091221);
}
.app{max-width:430px;margin:auto;padding:0 10px 30px}
.header{
  padding:18px 14px 22px;margin:0 -10px 10px;
  background:linear-gradient(135deg,#0f172a,#f59e0b 58%,#f97316);
  border-bottom-left-radius:24px;border-bottom-right-radius:24px;
  box-shadow:0 12px 26px rgba(0,0,0,.35);
}
.header h1{margin:0;font-size:24px}
.header p{margin:6px 0 0;font-size:12px;opacity:.94}
.card{
  background:linear-gradient(180deg,rgba(18,29,52,.98),rgba(11,20,36,.98));
  border:1px solid var(--line);
  border-radius:16px;
  padding:14px;
  margin:10px 0;
}
.section{font-size:14px;font-weight:800;margin-bottom:8px}
.row{display:flex;gap:8px}.row>*{flex:1}
input,select,button{
  width:100%;padding:10px;margin-top:6px;border:none;border-radius:10px;
  box-sizing:border-box;font-size:16px
}
input,select{background:#020617;color:#fff}
button{background:linear-gradient(135deg,var(--gold),#f97316);color:#fff;font-weight:800}
.btn-sub{background:linear-gradient(135deg,#475569,#334155)}
.badge{display:inline-block;padding:6px 10px;border-radius:999px;margin:4px;font-weight:800}
.good{background:var(--green)} .warn{background:var(--red)} .tip{background:var(--violet)} .gold{background:var(--gold);color:#111}
.small{font-size:12px;color:var(--muted);line-height:1.6}
.commentbox{margin-top:10px;padding:12px;border-radius:12px;background:#0f172a;border:1px solid #243352;line-height:1.7}
.listItem{padding:10px 0;border-bottom:1px solid #223454}
.listItem:last-child{border-bottom:none}
.nav{display:flex;gap:8px}
.nav a{
  flex:1;text-align:center;text-decoration:none;color:#fff;font-weight:800;
  background:#111827;border:1px solid #29405f;border-radius:14px;padding:12px 8px;
}
.nav a.active{background:linear-gradient(135deg,#f59e0b,#f97316)}
.tab{display:flex;gap:8px}
.tab button{margin-top:0}
.tab .activeBoat{background:linear-gradient(135deg,#0891b2,#2563eb)}
.tab .activeKeirin{background:linear-gradient(135deg,#7c3aed,#2563eb)}
.gridBoat{display:grid;grid-template-columns:38px 1fr 1fr;gap:6px;align-items:center;margin-top:6px}
.gridKeirin{display:grid;grid-template-columns:34px 1fr 1fr;gap:6px;align-items:center;margin-top:6px}
.cap{
  height:36px;border-radius:8px;display:flex;align-items:center;justify-content:center;
  font-weight:900
}
.c1{background:#fff;color:#000}.c2{background:#000;color:#fff}.c3{background:#ef4444;color:#fff}.c4{background:#2563eb;color:#fff}.c5{background:#f59e0b;color:#111}.c6{background:#16a34a;color:#fff}
.hidden{display:none}
</style>
</head>
<body>
<div class="app">
  <div class="header">
    <h1>統合AI 司令塔</h1>
    <p>ボートと競輪を登録して、勝負レースだけ絞るページ</p>
  </div>

  <div class="card">
    <div class="nav">
      <a href="index.html">メニュー</a>
      <a href="boat.html">ボート</a>
      <a href="keirin.html">競輪</a>
      <a href="unified.html" class="active">統合</a>
    </div>
  </div>

  <div class="card">
    <div class="section">統合設定</div>
    <input id="totalBudget" inputmode="numeric" placeholder="今日の総予算（例: 10000）">
    <div class="row">
      <button onclick="scanRaces()">勝負レース抽出</button>
      <button class="btn-sub" onclick="resetAll()">全消去</button>
    </div>
    <div class="small">ここでは細かい予想はせず、やるレースだけを絞ります。</div>
  </div>

  <div class="card">
    <div class="tab">
      <button id="boatBtn" class="activeBoat" onclick="setMode('boat')">🚤 ボート登録</button>
      <button id="keirinBtn" onclick="setMode('keirin')">🚴 競輪登録</button>
    </div>
  </div>

  <div id="boatArea">
    <div class="card">
      <div class="section">ボート 登録用入力</div>
      <input id="boatRaceName" placeholder="例: 常滑 7R">
      <div class="gridBoat">
        <div>艇</div><div>全国</div><div>ST</div>
      </div>
      <div id="boatInputs"></div>
      <div class="row" style="margin-top:8px">
        <button onclick="addBoatRace()">ボート登録</button>
        <button class="btn-sub" onclick="clearBoatForm()">入力クリア</button>
      </div>
      <div class="small">統合ページでは軽く登録するだけです。詳しい予想は boat.html で行います。</div>
    </div>
  </div>

  <div id="keirinArea" class="hidden">
    <div class="card">
      <div class="section">競輪 登録用入力</div>
      <input id="keirinRaceName" placeholder="例: 西武園 9R">
      <div class="gridKeirin">
        <div>車</div><div>指数</div><div>ライン</div>
      </div>
      <div id="keirinInputs"></div>
      <div class="row" style="margin-top:8px">
        <button onclick="addKeirinRace()">競輪登録</button>
        <button class="btn-sub" onclick="clearKeirinForm()">入力クリア</button>
      </div>
      <div class="small">統合ページでは勝負レース抽出用の簡易登録だけに絞っています。</div>
    </div>
  </div>

  <div class="card">
    <div class="section">登録レース一覧</div>
    <div id="savedList" class="small">まだありません。</div>
  </div>

  <div class="card">
    <div class="section">抽出結果</div>
    <div id="results">結果待ち</div>
  </div>
</div>

<script>
let mode="boat";
const saved=[];

function setMode(m){
  mode=m;
  document.getElementById("boatArea").classList.toggle("hidden", m!=="boat");
  document.getElementById("keirinArea").classList.toggle("hidden", m!=="keirin");
  document.getElementById("boatBtn").className = m==="boat" ? "activeBoat" : "";
  document.getElementById("keirinBtn").className = m==="keirin" ? "activeKeirin" : "";
}

function buildBoatInputs(){
  let html="";
  for(let i=1;i<=6;i++){
    html += '<div class="gridBoat"><div class="cap c'+i+'">'+i+'</div><input id="br'+i+'" inputmode="decimal" pattern="[0-9.]*"><input id="bs'+i+'" inputmode="decimal" pattern="[0-9.]*"></div>';
  }
  document.getElementById("boatInputs").innerHTML=html;
}

function buildKeirinInputs(){
  let html="";
  for(let i=1;i<=9;i++){
    html += '<div class="gridKeirin"><div class="cap" style="background:#1f2937">'+i+'</div><input id="ks'+i+'" inputmode="decimal" pattern="[0-9.]*"><input id="kl'+i+'" placeholder="A"></div>';
  }
  document.getElementById("keirinInputs").innerHTML=html;
}

function addBoatRace(){
  const name=document.getElementById("boatRaceName").value.trim();
  if(!name){ alert("レース名を入れてください"); return; }

  let rows=[];
  for(let i=1;i<=6;i++){
    const rate=+document.getElementById("br"+i).value||0;
    const st=+document.getElementById("bs"+i).value||0;
    const ai=rate*10 + (st>0 ? (0.20-st)*40 : 0) + (i===1 ? 8 : 0);
    rows.push({boat:i, ai:ai, st:st});
  }
  rows.sort((a,b)=>b.ai-a.ai);

  const diffTop3=rows[0].ai-rows[2].ai;
  const diffTop2=rows[0].ai-rows[1].ai;
  const fastCount=rows.filter(x=>x.st>0&&x.st<=0.13).length;

  let level="見送り";
  if(diffTop3>35) level="勝負";
  else if(diffTop3>20) level="準勝負";
  else if(fastCount>=2 || rows[0].boat!==1) level="穴注意";

  saved.push({
    type:"boat",
    name:name,
    top:rows[0].boat+"号艇",
    score:Math.round(diffTop2*10)/10,
    level:level,
    note:"上位差 "+diffTop3.toFixed(1)+" / 速ST "+fastCount+"艇"
  });

  refreshSaved();
  clearBoatForm();
}

function addKeirinRace(){
  const name=document.getElementById("keirinRaceName").value.trim();
  if(!name){ alert("レース名を入れてください"); return; }

  let rows=[], lineCount={};
  for(let i=1;i<=9;i++){
    const score=+document.getElementById("ks"+i).value||0;
    const line=document.getElementById("kl"+i).value.trim();
    let ai=score;
    rows.push({num:i, ai:ai, line:line});
    if(line) lineCount[line]=(lineCount[line]||0)+1;
  }
  rows.sort((a,b)=>b.ai-a.ai);

  const diffTop3=rows[0].ai-rows[2].ai;
  const diffTop2=rows[0].ai-rows[1].ai;
  const bigLine=Object.values(lineCount).some(v=>v>=3);

  let level="見送り";
  if(diffTop3>12) level="勝負";
  else if(diffTop3>7) level="準勝負";
  else if(bigLine) level="穴注意";

  saved.push({
    type:"keirin",
    name:name,
    top:rows[0].num+"番",
    score:Math.round(diffTop2*10)/10,
    level:level,
    note:"上位差 "+diffTop3.toFixed(1)+" / ライン警戒 "+(bigLine?"あり":"なし")
  });

  refreshSaved();
  clearKeirinForm();
}

function refreshSaved(){
  const el=document.getElementById("savedList");
  if(!saved.length){
    el.textContent="まだありません。";
    return;
  }
  el.innerHTML=saved.map((r,i)=>
    '<div class="listItem"><span class="badge '+(r.type==="boat"?"tip":"gold")+'">'+(r.type==="boat"?"ボート":"競輪")+'</span><b>'+(i+1)+'. '+r.name+'</b><br><span class="badge '+(r.level==="勝負"?"gold":r.level==="準勝負"?"good":"warn")+'">'+r.level+'</span><span class="badge tip">本命 '+r.top+'</span><span class="badge '+(r.score>=10?"gold":"good")+'">信頼差 '+r.score+'</span><div class="small">'+r.note+'</div></div>'
  ).join('');
}

function scanRaces(){
  const totalBudget=+document.getElementById("totalBudget").value||0;
  if(!saved.length){
    document.getElementById("results").textContent="先にレースを登録してください。";
    return;
  }

  const weight = x => x.level==="勝負" ? 3 : x.level==="準勝負" ? 2 : x.level==="穴注意" ? 1 : 0;
  const ranked = saved.slice().sort((a,b)=> (weight(b)-weight(a)) || (b.score-a.score));
  const picked = ranked.filter(x=>x.level!=="見送り").slice(0,5);

  if(!picked.length){
    document.getElementById("results").innerHTML='<div class="small">今日は見送り寄りです。</div>';
    return;
  }

  const budgetWeights=picked.map(x=>x.level==="勝負"?3:x.level==="準勝負"?2:1);
  const totalW=budgetWeights.reduce((a,b)=>a+b,0);

  document.getElementById("results").innerHTML = picked.map((r,i)=>{
    const alloc=totalBudget>0 ? Math.floor(totalBudget*budgetWeights[i]/totalW) : 0;
    return '<div class="listItem">'+
      '<div><span class="badge '+(r.type==="boat"?"tip":"gold")+'">'+(r.type==="boat"?"ボート":"競輪")+'</span><b>'+(i+1)+'位 '+r.name+'</b></div>'+
      '<div><span class="badge '+(r.level==="勝負"?"gold":r.level==="準勝負"?"good":"warn")+'">'+r.level+'</span><span class="badge tip">本命 '+r.top+'</span><span class="badge '+(r.score>=10?"gold":"good")+'">信頼差 '+r.score+'</span>'+(totalBudget>0?'<span class="badge good">配分 '+alloc+'円</span>':'')+'</div>'+
      '<div class="commentbox"><b>統合コメント：</b><br>'+(r.level==="勝負"?"今日の主力候補。":r.level==="準勝負"?"状況次第で狙える候補。":"穴狙いで押さえる候補。")+' '+r.note+'</div>'+
    '</div>';
  }).join('');
}

function clearBoatForm(){
  document.getElementById("boatRaceName").value="";
  for(let i=1;i<=6;i++){
    document.getElementById("br"+i).value="";
    document.getElementById("bs"+i).value="";
  }
}

function clearKeirinForm(){
  document.getElementById("keirinRaceName").value="";
  for(let i=1;i<=9;i++){
    document.getElementById("ks"+i).value="";
    document.getElementById("kl"+i).value="";
  }
}

function resetAll(){
  saved.length=0;
  document.getElementById("totalBudget").value="";
  refreshSaved();
  document.getElementById("results").innerHTML="結果待ち";
  clearBoatForm();
  clearKeirinForm();
}

buildBoatInputs();
buildKeirinInputs();
</script>
</body>
</html>
